<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris - Demo Mode & Autopilot</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="demo-msg" class="demo-banner">DEMO MODE: PRESS ANY KEY TO PLAY</div>

  <div class="game-container">
    <div class="side-panel">
      <div class="stat-box" id="level-box">
        <div class="stat-label">Level</div>
        <div id="level" class="stat-value">1</div>
      </div>

      <div class="stat-box" id="auto-box">
        <div class="stat-label">Autopilots (A)</div>
        <div id="auto-count" class="stat-value">3</div>
        <div id="auto-timer" style="font-size: 14px; display: none;">ACTIVE: 5.0s</div>
      </div>

      <div class="stat-box">
        <div class="stat-label">Score</div>
        <div id="score" class="stat-value">0</div>
      </div>
    </div>

    <table id="world"></table>

    <div class="side-panel">
      <div class="stat-box">
        <div class="stat-label">Next</div>
        <table id="preview-table"></table>
      </div>

      <button id="new-game-btn" type="button">New Game</button>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
