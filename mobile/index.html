<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tetris - Mobile Gestures</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="demo-msg" class="status-banner demo-banner">DEMO MODE: SWIPE OR TAP NEW GAME TO PLAY</div>
    <div id="pause-msg" class="status-banner pause-banner" aria-live="polite">PAUSED (double tap to resume)</div>

    <div class="game-container">
        <div class="side-panel left-panel">
            <div class="stat-box" id="level-box">
                <div class="stat-label">Level</div>
                <div id="level" class="stat-value">1</div>
            </div>

            <div class="stat-box" id="auto-box">
                <div class="stat-label">Autopilots (A)</div>
                <div id="auto-count" class="stat-value">3</div>
                <div id="auto-timer">ACTIVE: 5.0s</div>
            </div>

            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div id="score" class="stat-value">0</div>
            </div>
        </div>

        <table id="world" aria-label="Tetris board"></table>

        <div class="side-panel right-panel">
            <div class="stat-box">
                <div class="stat-label">Next</div>
                <table id="preview-table" aria-label="Next piece"></table>
            </div>

            <button id="new-game-btn" type="button">New Game</button>

            <div class="controls-hint">
                Swipe: left/right/up/down<br>
                Double tap: pause/resume
            </div>
        </div>
    </div>

    <script src="js/main.js" defer></script>
</body>
</html>
