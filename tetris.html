<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tetris JS - Pro Edition</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #222;
            color: white;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            padding-top: 20px;
        }
        .game-container { display: flex; gap: 20px; align-items: flex-start; }
        .side-panel { display: flex; flex-direction: column; gap: 20px; width: 150px; }
        
        .stat-box {
            background: #333;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #444;
        }
        .stat-label { font-size: 12px; color: #aaa; text-transform: uppercase; }
        .stat-value { font-size: 20px; font-weight: bold; color: #fff; }

        table { border-collapse: collapse; background-color: #111; border: 4px solid #444; }
        td { width: 25px; height: 25px; border: 1px solid #222; }

        #preview-table { border: 2px solid #444; margin-top: 5px; }
        #preview-table td { width: 20px; height: 20px; }

        /* Piece Colors */
        .color-0 { background-color: #00f0f0; border: 2px inset #70ffff; }
        .color-1 { background-color: #a000f0; border: 2px inset #e070ff; }
        .color-2 { background-color: #00f000; border: 2px inset #70ff70; }
        .color-3 { background-color: #f0f000; border: 2px inset #ffff70; }
        .color-4 { background-color: #f0a000; border: 2px inset #ffcf70; }
        .color-5 { background-color: #0000f0; border: 2px inset #7070ff; }
        .color-6 { background-color: #f00000; border: 2px inset #ff7070; }

        .controls { margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #555; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #777; }

        #high-scores { list-style: none; padding: 0; text-align: left; font-size: 14px; }
        #high-scores li { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px solid #444; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="side-panel">
            <div class="stat-box">
                <div class="stat-label">Level</div>
                <div id="level" class="stat-value">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">High Scores</div>
                <ul id="high-scores"></ul>
            </div>
        </div>

        <table id="world"></table>

        <div class="side-panel">
            <div class="stat-box">
                <div class="stat-label">Next</div>
                <table id="preview-table"></table>
            </div>
            <button onclick="resetGame()">New Game</button>
            <button id="pauseBtn" onclick="togglePause()">Pause (Esc)</button>
        </div>
    </div>

<script>
const pieces = [
    { shape: ['xxxx'], color: 0 }, 
    { shape: [' x ', 'xxx'], color: 1 }, 
    { shape: [' xx', 'xx '], color: 2 }, 
    { shape: ['xx', 'xx'], color: 3 }, 
    { shape: ['  x','xxx'], color: 4 }, 
    { shape: ['x  ','xxx'], color: 5 },
    { shape: ['xx ', ' xx'], color: 6 }
];

var field = {
    content: [],
    width: 10,
    height: 20,
    piece: null,
    nextPieceData: null,
    table: null,
    previewTable: null,
    speed: 500,
    level: 1,
    isRunning: false,
    isPaused: false,
    score: 0,
    timer: null,
    
    init: function() {
        this.table = document.getElementById('world');
        this.previewTable = document.getElementById('preview-table');
        this.resetInternalState();
        this.renderGrids();
        this.updateHighScoresUI();
    },

    resetInternalState: function() {
        this.score = 0;
        this.level = 1;
        this.speed = 500;
        this.isPaused = false;
        this.updateScore(0);
        this.content = Array.from({length: this.width}, () => Array(this.height).fill(false));
        this.nextPieceData = pieces[Math.floor(Math.random() * pieces.length)];
    },

    renderGrids: function() {
        this.table.innerHTML = "";
        for(let y = 0; y < this.height; y++) {
            let row = this.table.insertRow();
            for(let x = 0; x < this.width; x++) row.insertCell();
        }
        this.previewTable.innerHTML = "";
        for(let y = 0; y < 4; y++) {
            let row = this.previewTable.insertRow();
            for(let x = 0; x < 4; x++) row.insertCell();
        }
    },
    
    addPiece: function() {
        const pData = this.nextPieceData;
        this.nextPieceData = pieces[Math.floor(Math.random() * pieces.length)];
        this.drawPreview();

        this.piece = new Piece(pData.shape, pData.color, this);
        if (!this.piece.canMove(0, 0)) {
            this.gameOver();
            return false;
        }
        this.piece.markMe();
        return true;
    },

    drawPreview: function() {
        for(let y=0; y<4; y++) {
            for(let x=0; x<4; x++) {
                this.previewTable.rows[y].cells[x].className = "";
                if(this.nextPieceData.shape[y] && this.nextPieceData.shape[y][x] === 'x') {
                    this.previewTable.rows[y].cells[x].className = 'color-' + this.nextPieceData.color;
                }
            }
        }
    },

    step: function() {
        if (!this.isRunning || this.isPaused) return;
        if (this.piece) {
            if (!this.piece.move(0, 1)) {
                this.piece.fix();
                this.checkLines();
                this.piece = null;
                if(!this.addPiece()) return;
            }
        }
        this.timer = setTimeout(() => { this.step(); }, this.speed);
    },

    checkLines: function() {
        let linesCleared = 0;
        for (let y = this.height - 1; y >= 0; y--) {
            if (this.content.every(col => col[y] !== false)) {
                linesCleared++;
                this.removeLine(y);
                y++; 
            }
        }
        if (linesCleared > 0) {
            // Scoring: 1: 100, 2: 300, 3: 500, 4: 800
            const bonus = [0, 100, 300, 500, 800];
            this.updateScore(bonus[linesCleared] * this.level);
        }
    },

    removeLine: function(yLine) {
        for (let y = yLine; y > 0; y--) {
            for (let x = 0; x < this.width; x++) {
                this.content[x][y] = this.content[x][y-1];
                this.table.rows[y].cells[x].className = this.table.rows[y-1].cells[x].className;
            }
        }
        for (let x = 0; x < this.width; x++) {
            this.content[x][0] = false;
            this.table.rows[0].cells[x].className = "";
        }
    },

    updateScore: function(pts) {
        this.score += pts;
        document.getElementById('score').innerText = this.score;
        
        // Level logic: every 1000 pts
        let newLevel = Math.floor(this.score / 1000) + 1;
        if (newLevel > this.level) {
            this.level = newLevel;
            this.speed = Math.max(100, 500 - (this.level * 40));
            document.getElementById('level').innerText = this.level;
        }
    },

    gameOver: function() {
        this.isRunning = false;
        this.saveHighScore(this.score);
        alert("Game Over! Score: " + this.score);
        this.updateHighScoresUI();
    },

    saveHighScore: function(score) {
        let scores = JSON.parse(localStorage.getItem('tetris_scores') || "[]");
        scores.push(score);
        scores.sort((a, b) => b - a);
        localStorage.setItem('tetris_scores', JSON.stringify(scores.slice(0, 5)));
    },

    updateHighScoresUI: function() {
        const scores = JSON.parse(localStorage.getItem('tetris_scores') || "[]");
        const list = document.getElementById('high-scores');
        list.innerHTML = scores.map((s, i) => `<li><span>#${i+1}</span> <span>${s}</span></li>`).join('');
    }
};

function Piece(shape, colorIndex, field) {
    this.shape = shape;
    this.colorIndex = colorIndex;
    this.field = field;
    this.x = 3;
    this.y = 0;
    this.rotation = 0;
    
    this.rotate = function() {
        this.unmarkMe();
        let oldRot = this.rotation;
        this.rotation = (this.rotation + 1) % 4;
        if (!this.canMove(0, 0)) this.rotation = oldRot;
        this.markMe();
    };
        
    this.shapeState = function(x, y) {   
        let lx = this.shape[0].length - 1;
        let ly = this.shape.length - 1;  
        try {
            switch(this.rotation) {
                case 0: return this.shape[y] && this.shape[y][x] === 'x';
                case 1: return this.shape[ly - x] && this.shape[ly - x][y] === 'x';
                case 2: return this.shape[ly - y] && this.shape[ly - y][lx - x] === 'x';
                case 3: return this.shape[x] && this.shape[x][lx - y] === 'x';
            }
        } catch(e) { return false; }
    };
    
    this.dim = function() {
        return (this.rotation % 2 === 0) ? 
            { w: this.shape[0].length, h: this.shape.length } : 
            { w: this.shape.length, h: this.shape[0].length };
    };

    this.canMove = function(ax, ay) {
        let {w, h} = this.dim();
        for(let y = 0; y < h; y++) {
            for(let x = 0; x < w; x++) {
                if (this.shapeState(x, y)) {
                    let nx = this.x + ax + x;
                    let ny = this.y + ay + y;
                    if (nx < 0 || nx >= this.field.width || ny >= this.field.height) return false;
                    if (ny >= 0 && this.field.content[nx][ny] !== false) return false;
                }
            }
        }
        return true;
    };

    this.move = function(dx, dy) {
        if (this.canMove(dx, dy)) {
            this.unmarkMe();
            this.x += dx; this.y += dy;    
            this.markMe();
            return true;
        }
        return false;
    };

    this.hardDrop = function() {
        this.unmarkMe();
        while(this.canMove(0, 1)) this.y++;
        this.markMe();
        this.fix();
        this.field.checkLines();
        this.field.piece = null;
        this.field.addPiece();
    };
    
    this.markMe = function() {
        let {w, h} = this.dim();
        for(let y = 0; y < h; y++)
            for(let x = 0; x < w; x++)
                if (this.shapeState(x, y)) this.field.table.rows[this.y+y].cells[this.x+x].className = 'color-'+this.colorIndex;
    };

    this.unmarkMe = function() {
        let {w, h} = this.dim();
        for(let y = 0; y < h; y++)
            for(let x = 0; x < w; x++)
                if (this.shapeState(x, y)) this.field.table.rows[this.y+y].cells[this.x+x].className = "";
    };
    
    this.fix = function() {
        let {w, h} = this.dim();
        for(let y = 0; y < h; y++) {
            for(let x = 0; x < w; x++) {
                if (this.shapeState(x, y)) {
                    if (this.y+y >= 0) this.field.content[this.x+x][this.y+y] = this.colorIndex;
                }
            }
        }
    };
}

function togglePause() {
    field.isPaused = !field.isPaused;
    document.getElementById('pauseBtn').innerText = field.isPaused ? 'Resume' : 'Pause (Esc)';
    if (!field.isPaused) field.step();
}

function resetGame() {
    clearTimeout(field.timer);
    field.init();
    field.isRunning = true;
    field.addPiece();
    field.step();
}

window.onload = () => {
    field.init();
    window.onkeydown = (e) => {
        if (e.keyCode === 27) togglePause();
        if (!field.piece || field.isPaused) return;
        switch(e.keyCode) {
            case 37: field.piece.move(-1, 0); break;
            case 39: field.piece.move(1, 0);  break;
            case 40: field.piece.move(0, 1);  break;
            case 38: field.piece.rotate();    break;
            case 32: e.preventDefault(); field.piece.hardDrop(); break;
        }
    };
};
</script>
</body>
</html>
