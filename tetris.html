<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tetris JS - Full Color</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; }
        button { padding: 8px 15px; cursor: pointer; background-color: #333; color: white; border: none; border-radius: 4px; }
        .score-board { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        
        table {
            border-collapse: collapse;
            background-color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            border: 2px solid #333;
        }
        td {
            width: 25px;
            height: 25px;
            border: 1px solid #eee;
        }

        /* Piece Colors */
        .color-0 { background-color: #00f0f0; border: 2px inset #70ffff; } /* I */
        .color-1 { background-color: #a000f0; border: 2px inset #e070ff; } /* T */
        .color-2 { background-color: #00f000; border: 2px inset #70ff70; } /* S */
        .color-3 { background-color: #f0f000; border: 2px inset #ffff70; } /* O */
        .color-4 { background-color: #f0a000; border: 2px inset #ffcf70; } /* L */
        .color-5 { background-color: #0000f0; border: 2px inset #7070ff; } /* J */
        .color-6 { background-color: #f00000; border: 2px inset #ff7070; } /* Z */

        .paused-overlay {
            position: absolute;
            font-size: 40px;
            font-weight: bold;
            color: rgba(0,0,0,0.3);
            pointer-events: none;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="score-board">Score: <span id="score">0</span></div>
    
    <div class="controls">
        <button onclick="resetGame()">New Game</button>
        <button id="pauseBtn" onclick="togglePause()">Pause</button>
    </div>

    <div id="pauseLabel" class="paused-overlay">PAUSED</div>
    <table id="world"></table>

<script type="text/javascript">
// Added color indices to pieces
const pieces = [
    { shape: ['xxxx'], color: 0 }, 
    { shape: [' x ', 'xxx'], color: 1 }, 
    { shape: [' xx', 'xx '], color: 2 }, 
    { shape: ['xx', 'xx'], color: 3 }, 
    { shape: ['  x','xxx'], color: 4 }, 
    { shape: ['x  ','xxx'], color: 5 },
    { shape: ['xx ', ' xx'], color: 6 }
];

var field = {
    content: [], // Now stores the color index or false
    width: 10,
    height: 20,
    piece: null,
    table: null,
    speed: 400,
    isRunning: false,
    isPaused: false,
    score: 0,
    timer: null,
    
    init: function(tableElement) {
        this.table = tableElement;
        this.resetInternalState();
        this.renderTable();
    },

    resetInternalState: function() {
        this.score = 0;
        this.updateScore(0);
        this.isPaused = false;
        this.content = [];
        for(var i = 0; i < this.width; i++) {
            this.content[i] = [];
            for(var j = 0; j < this.height; j++) this.content[i][j] = false;
        }
    },

    renderTable: function() {
        this.table.innerHTML = "";
        for(var y = 0; y < this.height; y++) {
            var row = document.createElement('tr');
            for(var x = 0; x < this.width; x++) row.appendChild(document.createElement('td'));
            this.table.appendChild(row);
        }
    },
    
    addPiece: function() {
        var pData = pieces[Math.floor(Math.random() * pieces.length)];
        this.piece = new Piece(pData.shape, pData.color, this);
        if (!this.piece.canMove(0, 0)) {
            alert("Game Over! Final Score: " + this.score);
            this.isRunning = false;
            return false;
        }
        this.piece.markMe();
        return true;
    },

    step: function() {
        if (!this.isRunning || this.isPaused) return;

        if (this.piece) {
            if (!this.piece.move(0, 1)) {
                this.piece.fix();
                this.checkLines();
                this.piece = null;
                if(!this.addPiece()) return;
            }
        }
        this.timer = setTimeout(() => { this.step(); }, this.speed);
    },

    checkLines: function() {
        var linesCleared = 0;
        for (var y = this.height - 1; y >= 0; y--) {
            var isFull = true;
            for (var x = 0; x < this.width; x++) {
                if (this.content[x][y] === false) { isFull = false; break; }
            }
            if (isFull) {
                linesCleared++;
                this.removeLine(y);
                y++; 
            }
        }
        if (linesCleared > 0) this.updateScore(linesCleared * 100);
    },

    removeLine: function(yLine) {
        for (var y = yLine; y > 0; y--) {
            for (var x = 0; x < this.width; x++) {
                this.content[x][y] = this.content[x][y-1];
                var cell = this.getCell(x, y);
                var upperCell = this.getCell(x, y-1);
                cell.className = upperCell.className;
            }
        }
        for (var x = 0; x < this.width; x++) {
            this.content[x][0] = false;
            this.getCell(x, 0).className = '';
        }
    },

    updateScore: function(pts) {
        this.score += pts;
        document.getElementById('score').innerText = this.score;
    },
    
    run: function() {
        this.isRunning = true;
        this.addPiece();
        this.step();
    },

    getCell: function(x, y) {
        if (y < 0 || y >= this.height || x < 0 || x >= this.width) return null;
        return this.table.rows[y].cells[x];
    },
    
    paint: function(x, y, colorIndex) {
        var cell = this.getCell(x, y);
        if (cell) cell.className = 'color-' + colorIndex;
    },
    
    unpaint: function(x, y) {
        var cell = this.getCell(x, y);
        if (cell) cell.className = '';
    }
};

function Piece(shape, colorIndex, field) {
    this.shape = shape;
    this.colorIndex = colorIndex;
    this.field = field;
    this.x = 4;
    this.y = 0;
    this.rotation = 0;
    
    this.rotate = function() {
        this.unmarkMe();
        var oldRot = this.rotation;
        this.rotation = (this.rotation + 1) % 4;
        if (!this.canMove(0, 0)) this.rotation = oldRot;
        this.markMe();
    };
        
    this.shapeState = function(x, y) {   
        var lx = this.shape[0].length - 1;
        var ly = this.shape.length - 1;  
        try {
            switch(this.rotation) {
                case 0: return this.shape[y] && this.shape[y][x] === 'x';
                case 1: return this.shape[ly - x] && this.shape[ly - x][y] === 'x';
                case 2: return this.shape[ly - y] && this.shape[ly - y][lx - x] === 'x';
                case 3: return this.shape[x] && this.shape[x][lx - y] === 'x';
            }
        } catch(e) { return false; }
    };
    
    this.getWidth = function() { return (this.rotation % 2 === 0) ? this.shape[0].length : this.shape.length; };
    this.getHeight = function() { return (this.rotation % 2 === 0) ? this.shape.length : this.shape[0].length; };

    this.canMove = function(ax, ay) {
        for(var y = 0; y < this.getHeight(); y++) {
            for(var x = 0; x < this.getWidth(); x++) {
                if (this.shapeState(x, y)) {
                    var nx = this.x + ax + x;
                    var ny = this.y + ay + y;
                    if (nx < 0 || nx >= this.field.width || ny >= this.field.height) return false;
                    if (ny >= 0 && this.field.content[nx][ny] !== false) return false;
                }
            }
        }
        return true;
    };

    this.move = function(dx, dy) {
        if (this.canMove(dx, dy)) {
            this.unmarkMe();
            this.x += dx;
            this.y += dy;    
            this.markMe();
            return true;
        }
        return false;
    };

    this.hardDrop = function() {
        this.unmarkMe();
        while(this.canMove(0, 1)) { this.y++; }
        this.markMe();
        this.fix();
        this.field.checkLines();
        this.field.piece = null;
        this.field.addPiece();
    };
    
    this.markMe = function() {
       for(var y = 0; y < this.getHeight(); y++)
           for(var x = 0; x < this.getWidth(); x++)
               if (this.shapeState(x, y)) this.field.paint(this.x + x, this.y + y, this.colorIndex);
    };

    this.unmarkMe = function() {
       for(var y = 0; y < this.getHeight(); y++)
           for(var x = 0; x < this.getWidth(); x++)
               if (this.shapeState(x, y)) this.field.unpaint(this.x + x, this.y + y);
    };
    
    this.fix = function() {
       for(var y = 0; y < this.getHeight(); y++) {
           for(var x = 0; x < this.getWidth(); x++) {
               if (this.shapeState(x, y)) {
                   var fx = this.x + x;
                   var fy = this.y + y;
                   if (fy >= 0) {
                       this.field.content[fx][fy] = this.colorIndex;
                       this.field.paint(fx, fy, this.colorIndex);
                   }
               }
           }
       }
    };
}

function togglePause() {
    field.isPaused = !field.isPaused;
    document.getElementById('pauseLabel').style.display = field.isPaused ? 'block' : 'none';
    document.getElementById('pauseBtn').innerText = field.isPaused ? 'Resume' : 'Pause';
    if (!field.isPaused) field.step();
}

function resetGame() {
    clearTimeout(field.timer);
    field.init(document.getElementById('world'));
    field.run();
}

window.onload = function() {
    field.init(document.getElementById('world'));
    field.run();

    window.onkeydown = function(event) {
        if (event.keyCode === 27) { togglePause(); return; }
        if (!field.piece || field.isPaused) return;
        
        switch(event.keyCode) {
            case 37: field.piece.move(-1, 0); break; // Left
            case 39: field.piece.move(1, 0);  break; // Right
            case 40: field.piece.move(0, 1);  break; // Down
            case 38: field.piece.rotate();    break; // Up (Rotate)
            case 32: field.piece.hardDrop();  break; // Space
        }
    };
};
</script>
</body>
</html>
