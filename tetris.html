<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tetris JS - Autopilot Edition</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            padding-top: 20px;
        }
        .game-container { display: flex; gap: 20px; align-items: flex-start; }
        .side-panel { display: flex; flex-direction: column; gap: 15px; width: 160px; }
        
        .stat-box {
            background: #2a2a2a;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #3d3d3d;
        }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 22px; font-weight: bold; color: #00d4ff; }
        .stat-value.auto { color: #ffeb3b; }

        table { border-collapse: collapse; background-color: #000; border: 4px solid #333; }
        td { width: 28px; height: 28px; border: 1px solid #111; }

        #preview-table { border: 2px solid #333; margin: 10px auto; }
        #preview-table td { width: 20px; height: 20px; }

        .color-0 { background-color: #00f0f0; border: 2px inset #70ffff; }
        .color-1 { background-color: #a000f0; border: 2px inset #e070ff; }
        .color-2 { background-color: #00f000; border: 2px inset #70ff70; }
        .color-3 { background-color: #f0f000; border: 2px inset #ffff70; }
        .color-4 { background-color: #f0a000; border: 2px inset #ffcf70; }
        .color-5 { background-color: #0000f0; border: 2px inset #7070ff; }
        .color-6 { background-color: #f00000; border: 2px inset #ff7070; }

        .ghost { opacity: 0.3; border: 1px dashed rgba(255,255,255,0.5) !important; }

        .controls-hint { font-size: 11px; color: #666; margin-top: 10px; line-height: 1.4; }
        button { padding: 10px; cursor: pointer; background: #444; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #00d4ff; color: #000; }
        
        #high-scores { list-style: none; padding: 0; font-size: 13px; }
        #high-scores li { display: flex; justify-content: space-between; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="side-panel">
            <div class="stat-box">
                <div class="stat-label">Level</div>
                <div id="level" class="stat-value">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Autopilots (A)</div>
                <div id="auto-count" class="stat-value auto">3</div>
            </div>
        </div>

        <table id="world"></table>

        <div class="side-panel">
            <div class="stat-box">
                <div class="stat-label">Next</div>
                <table id="preview-table"></table>
            </div>
            <button onclick="resetGame()">New Game</button>
            <div class="stat-box">
                <div class="stat-label">High Scores</div>
                <ul id="high-scores"></ul>
            </div>
            <div class="controls-hint">
                Arrows: Move/Rotate<br>
                Space: Hard Drop<br>
                <b>A: Use Autopilot</b>
            </div>
        </div>
    </div>

<script>
const pieces = [
    { shape: ['xxxx'], color: 0 }, { shape: [' x ', 'xxx'], color: 1 }, 
    { shape: [' xx', 'xx '], color: 2 }, { shape: ['xx', 'xx'], color: 3 }, 
    { shape: ['  x','xxx'], color: 4 }, { shape: ['x  ','xxx'], color: 5 },
    { shape: ['xx ', ' xx'], color: 6 }
];

var field = {
    content: [], width: 10, height: 20,
    piece: null, nextPieceData: null,
    table: null, previewTable: null,
    speed: 500, level: 1, isRunning: false, isPaused: false,
    score: 0, timer: null, autoCharges: 3,
    
    init: function() {
        this.table = document.getElementById('world');
        this.previewTable = document.getElementById('preview-table');
        this.resetInternalState();
        this.renderGrids();
        this.updateHighScoresUI();
    },

    resetInternalState: function() {
        this.score = 0; this.level = 1; this.speed = 500; this.autoCharges = 3;
        this.isPaused = false;
        this.updateScore(0);
        this.content = Array.from({length: this.width}, () => Array(this.height).fill(false));
        this.nextPieceData = pieces[Math.floor(Math.random() * pieces.length)];
        document.getElementById('auto-count').innerText = this.autoCharges;
    },

    renderGrids: function() {
        this.table.innerHTML = "";
        for(let y = 0; y < this.height; y++) {
            let row = this.table.insertRow();
            for(let x = 0; x < this.width; x++) row.insertCell();
        }
        this.previewTable.innerHTML = "";
        for(let y = 0; y < 4; y++) {
            let row = this.previewTable.insertRow();
            for(let x = 0; x < 4; x++) row.insertCell();
        }
    },
    
    addPiece: function() {
        const pData = this.nextPieceData;
        this.nextPieceData = pieces[Math.floor(Math.random() * pieces.length)];
        this.drawPreview();
        this.piece = new Piece(pData.shape, pData.color, this);
        if (!this.piece.canMove(0, 0)) { this.gameOver(); return false; }
        this.piece.markMe();
        return true;
    },

    drawPreview: function() {
        for(let y=0; y<4; y++) {
            for(let x=0; x<4; x++) {
                this.previewTable.rows[y].cells[x].className = "";
                if(this.nextPieceData.shape[y] && this.nextPieceData.shape[y][x] === 'x') {
                    this.previewTable.rows[y].cells[x].className = 'color-' + this.nextPieceData.color;
                }
            }
        }
    },

    step: function() {
        if (!this.isRunning || this.isPaused) return;
        if (this.piece) {
            if (!this.piece.move(0, 1)) {
                this.piece.fix();
                this.checkLines();
                this.piece = null;
                if(!this.addPiece()) return;
            }
        }
        this.timer = setTimeout(() => { this.step(); }, this.speed);
    },

    checkLines: function() {
        let linesCleared = 0;
        for (let y = this.height - 1; y >= 0; y--) {
            if (this.content.every(col => col[y] !== false)) {
                linesCleared++;
                this.removeLine(y);
                y++; 
            }
        }
        if (linesCleared > 0) {
            const bonus = [0, 100, 300, 500, 800];
            this.updateScore(bonus[linesCleared] * this.level);
        }
    },

    removeLine: function(yLine) {
        for (let y = yLine; y > 0; y--) {
            for (let x = 0; x < this.width; x++) {
                this.content[x][y] = this.content[x][y-1];
                this.table.rows[y].cells[x].className = this.table.rows[y-1].cells[x].className;
            }
        }
        for (let x = 0; x < this.width; x++) {
            this.content[x][0] = false;
            this.table.rows[0].cells[x].className = "";
        }
    },

    updateScore: function(pts) {
        this.score += pts;
        document.getElementById('score').innerText = this.score;
        let newLevel = Math.floor(this.score / 1000) + 1;
        if (newLevel > this.level) {
            this.level = newLevel;
            this.speed = Math.max(80, 500 - (this.level * 35));
            this.autoCharges += 1;
            document.getElementById('level').innerText = this.level;
            document.getElementById('auto-count').innerText = this.autoCharges;
        }
    },

    useAutopilot: function() {
        if (this.autoCharges > 0 && this.piece && !this.isPaused) {
            this.autoCharges--;
            document.getElementById('auto-count').innerText = this.autoCharges;
            this.piece.autoSolve();
        }
    },

    gameOver: function() {
        this.isRunning = false;
        let scores = JSON.parse(localStorage.getItem('tetris_scores_v3') || "[]");
        scores.push(this.score);
        scores.sort((a, b) => b - a);
        localStorage.setItem('tetris_scores_v3', JSON.stringify(scores.slice(0, 5)));
        alert("GAME OVER\nScore: " + this.score);
        this.updateHighScoresUI();
    },

    updateHighScoresUI: function() {
        const scores = JSON.parse(localStorage.getItem('tetris_scores_v3') || "[]");
        document.getElementById('high-scores').innerHTML = scores.map((s, i) => `<li>#${i+1} <span>${s}</span></li>`).join('');
    }
};

function Piece(shape, colorIndex, field) {
    this.shape = shape; this.colorIndex = colorIndex; this.field = field;
    this.x = 3; this.y = 0; this.rotation = 0;
    
    this.rotate = function() {
        this.unmarkMe();
        let oldRot = this.rotation;
        this.rotation = (this.rotation + 1) % 4;
        if (!this.canMove(0, 0)) this.rotation = oldRot;
        this.markMe();
    };

    this.shapeState = function(x, y, rot = this.rotation) {   
        let lx = this.shape[0].length - 1;
        let ly = this.shape.length - 1;  
        try {
            switch(rot) {
                case 0: return this.shape[y] && this.shape[y][x] === 'x';
                case 1: return this.shape[ly - x] && this.shape[ly - x][y] === 'x';
                case 2: return this.shape[ly - y] && this.shape[ly - y][lx - x] === 'x';
                case 3: return this.shape[x] && this.shape[x][lx - y] === 'x';
            }
        } catch(e) { return false; }
    };

    this.dim = function(rot = this.rotation) {
        return (rot % 2 === 0) ? { w: this.shape[0].length, h: this.shape.length } : { w: this.shape.length, h: this.shape[0].length };
    };

    this.canMove = function(ax, ay, rot = this.rotation) {
        let {w, h} = this.dim(rot);
        for(let y = 0; y < h; y++) {
            for(let x = 0; x < w; x++) {
                if (this.shapeState(x, y, rot)) {
                    let nx = this.x + ax + x;
                    let ny = this.y + ay + y;
                    if (nx < 0 || nx >= this.field.width || ny >= this.field.height) return false;
                    if (ny >= 0 && this.field.content[nx][ny] !== false) return false;
                }
            }
        }
        return true;
    };

    this.getGhostY = function() {
        let gy = this.y;
        while (this.canMove(0, (gy - this.y) + 1)) gy++;
        return gy;
    };

    this.move = function(dx, dy) {
        if (this.canMove(dx, dy)) {
            this.unmarkMe();
            this.x += dx; this.y += dy;    
            this.markMe();
            return true;
        }
        return false;
    };

    this.hardDrop = function() {
        this.unmarkMe();
        this.y = this.getGhostY();
        this.markMe();
        this.fix();
        this.field.checkLines();
        this.field.piece = null;
        this.field.addPiece();
    };

    this.autoSolve = function() {
        let bestX = 0, bestRot = 0, bestScore = -Infinity;
        // Simple heuristic: look for lowest Y and least holes
        for (let r = 0; r < 4; r++) {
            for (let tx = -2; tx < this.field.width; tx++) {
                let originalX = this.x; let originalRot = this.rotation;
                this.x = tx; this.rotation = r;
                if (this.canMove(0, 0)) {
                    let gy = this.getGhostY();
                    let score = gy * 10; // Favor lower positions
                    if (score > bestScore) { bestScore = score; bestX = tx; bestRot = r; }
                }
                this.x = originalX; this.rotation = originalRot;
            }
        }
        this.unmarkMe();
        this.x = bestX; this.rotation = bestRot;
        this.hardDrop();
    };
    
    this.markMe = function() {
        let {w, h} = this.dim();
        let gy = this.getGhostY();
        for(let y = 0; y < h; y++)
            for(let x = 0; x < w; x++)
                if (this.shapeState(x, y)) {
                    this.field.table.rows[gy+y].cells[this.x+x].className = 'color-'+this.colorIndex+' ghost';
                    this.field.table.rows[this.y+y].cells[this.x+x].className = 'color-'+this.colorIndex;
                }
    };

    this.unmarkMe = function() {
        let {w, h} = this.dim();
        let gy = this.getGhostY();
        for(let y = 0; y < h; y++)
            for(let x = 0; x < w; x++)
                if (this.shapeState(x, y)) {
                    this.field.table.rows[this.y+y].cells[this.x+x].className = "";
                    this.field.table.rows[gy+y].cells[this.x+x].className = "";
                }
    };
    
    this.fix = function() {
        let {w, h} = this.dim();
        for(let y = 0; y < h; y++)
            for(let x = 0; x < w; x++)
                if (this.shapeState(x, y) && this.y+y >= 0) this.field.content[this.x+x][this.y+y] = this.colorIndex;
    };
}

function togglePause() {
    if (!field.isRunning) return;
    field.isPaused = !field.isPaused;
    if (!field.isPaused) field.step();
}

function resetGame() {
    clearTimeout(field.timer);
    field.init(); field.isRunning = true; field.addPiece(); field.step();
}

window.onload = () => {
    field.init();
    window.onkeydown = (e) => {
        if (e.keyCode === 27) togglePause();
        if (!field.piece || field.isPaused) return;
        switch(e.keyCode) {
            case 37: field.piece.move(-1, 0); break;
            case 39: field.piece.move(1, 0);  break;
            case 40: field.piece.move(0, 1);  break;
            case 38: field.piece.rotate();    break;
            case 32: e.preventDefault(); field.piece.hardDrop(); break;
            case 65: field.useAutopilot(); break; // 'A'
        }
    };
};
</script>
</body>
</html>
