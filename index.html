<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tetris - Demo Mode & Autopilot</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="demo-msg" class="demo-banner">DEMO MODE: PRESS ANY KEY OR TAP NEW GAME TO PLAY</div>

    <div class="game-container">
        <div class="side-panel">
            <div class="stat-box" id="level-box">
                <div class="stat-label">Level</div>
                <div id="level" class="stat-value">1</div>
            </div>

            <div class="stat-box" id="auto-box">
                <div class="stat-label">Autopilots (A)</div>
                <div id="auto-count" class="stat-value">3</div>
                <div id="auto-timer">ACTIVE: 5.0s</div>
            </div>

            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div id="score" class="stat-value">0</div>
            </div>
        </div>

        <table id="world" aria-label="Tetris board"></table>

        <div class="side-panel">
            <div class="stat-box">
                <div class="stat-label">Next</div>
                <table id="preview-table" aria-label="Next piece"></table>
            </div>

            <button id="new-game-btn" type="button">New Game</button>

            <div class="controls-hint">
                Keyboard: Arrows move/rotate, Space drops, A enables autopilot
            </div>

            <div class="mobile-controls" aria-label="Touch controls">
                <div class="mobile-controls-row">
                    <button class="mobile-btn" type="button" data-action="rotate">Rotate</button>
                    <button class="mobile-btn" type="button" data-action="drop">Drop</button>
                </div>
                <div class="mobile-controls-row">
                    <button class="mobile-btn" type="button" data-action="left">Left</button>
                    <button class="mobile-btn" type="button" data-action="down">Down</button>
                    <button class="mobile-btn" type="button" data-action="right">Right</button>
                </div>
                <div class="mobile-controls-row">
                    <button class="mobile-btn" type="button" data-action="autopilot">Autopilot</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
